<!-- ============ Password gate (team access) ============ -->
<script>
(function(){
  const PW="dmgroup2026";
  const KEY="dm_dawsons_auth_v1";
  if(sessionStorage.getItem(KEY)===PW) return;
  document.documentElement.style.background="#23201F";
  document.addEventListener("DOMContentLoaded",()=>{
    const g=document.createElement("div");
    g.id="__gate";
    g.innerHTML=`
      <style>
        #__gate{position:fixed;inset:0;background:#23201F;z-index:99999;
          display:flex;align-items:center;justify-content:center;
          font-family:Arial,Helvetica,sans-serif;color:#fff;padding:20px}
        #__gate .box{background:#fff;color:#23201F;border-radius:8px;width:100%;max-width:380px;
          overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        #__gate .head{background:#23201F;color:#fff;padding:16px 20px;
          border-bottom:3px solid #FDD300;display:flex;align-items:center;gap:12px}
        #__gate .mark{width:40px;height:40px;border-radius:6px;background:#FDD300;color:#23201F;
          display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;letter-spacing:-1px}
        #__gate h2{font-size:15px;font-weight:700;margin:0}
        #__gate .head p{font-size:11px;color:rgba(255,255,255,.55);margin:2px 0 0}
        #__gate .body{padding:22px 22px 18px}
        #__gate label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#4E4E4E;font-weight:700;display:block;margin-bottom:6px}
        #__gate input{width:100%;padding:11px 13px;border:1px solid #D0D0D0;border-radius:5px;
          font-size:14px;font-family:inherit;color:#23201F;outline:none}
        #__gate input:focus{border-color:#E6BE00;box-shadow:0 0 0 3px rgba(253,211,0,.22)}
        #__gate .err{color:#c0392b;font-size:12px;margin-top:8px;min-height:16px;font-weight:600}
        #__gate button{width:100%;margin-top:14px;background:#FDD300;color:#23201F;border:1px solid #E6BE00;
          padding:11px;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
        #__gate button:hover{background:#E6BE00}
        #__gate .hint{margin-top:14px;font-size:11px;color:#888;text-align:center;line-height:1.5}
      </style>
      <div class="box">
        <div class="head">
          <div class="mark">DM</div>
          <div>
            <h2>Team Access Required</h2>
            <p>DM Group internal portal</p>
          </div>
        </div>
        <div class="body">
          <label for="__pw">Password</label>
          <input id="__pw" type="password" autofocus placeholder="Enter team password">
          <div class="err" id="__err"></div>
          <button id="__go">Unlock</button>
          <div class="hint">For client access, use the read-only view link provided by DM Group.</div>
        </div>
      </div>`;
    document.body.appendChild(g);
    Array.from(document.body.children).forEach(el=>{if(el.id!=="__gate")el.style.display="none";});
    const tryPw=()=>{
      const v=document.getElementById("__pw").value;
      if(v===PW){
        sessionStorage.setItem(KEY,PW);
        g.remove();
        Array.from(document.body.children).forEach(el=>el.style.display="");
        document.documentElement.style.background="";
      }else{
        document.getElementById("__err").textContent="Incorrect password. Try again.";
        document.getElementById("__pw").select();
      }
    };
    document.getElementById("__go").addEventListener("click",tryPw);
    document.getElementById("__pw").addEventListener("keydown",e=>{if(e.key==="Enter")tryPw();});
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --dm-yellow:#FDD300;
  --dm-yellow-dark:#E6BE00;

body{font-family:Arial,Helvetica,sans-serif;font-size:15px;color:var(--dm-black);background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ===================== The job button ===================== */
.job{
  display:flex;
  align-items:center;
  gap:16px;
  padding:14px 16px;
  background:#fff;
  border:1px solid var(--dm-border);
  border-left:5px solid var(--dm-yellow);
  border-radius:6px;
  text-decoration:none;
  color:inherit;
  box-shadow:0 1px 2px rgba(35,32,31,.05);
  transition:.12s;
}
.job:hover{border-color:var(--dm-charcoal);border-left-color:var(--dm-yellow);background:#fafafa;box-shadow:0 3px 10px rgba(35,32,31,.10)}
.job-num{
  font-family:"SFMono-Regular",Consolas,"Courier New",monospace;

  font-weight:700;
  color:var(--dm-black);
  background:var(--dm-yellow);
  padding:8px 14px;
  border-radius:5px;
  letter-spacing:.5px;
  flex-shrink:0;
  min-width:110px;
  text-align:center;
}
.job-text{flex:1;min-width:0}
.job-project{font-size:16px;font-weight:700;color:var(--dm-black);line-height:1.25}

.job-actions{display:flex;gap:5px;flex-shrink:0}
.job-actions a,.job-actions button{

  background:#f5f5f5;border:1px solid var(--dm-border);
  border-radius:5px;cursor:pointer;color:var(--dm-charcoal);
  text-decoration:none;transition:.12s;
}
.job-actions a:hover,.job-actions button:hover{background:#eaeaea;color:var(--dm-black);border-color:var(--dm-charcoal)}
.job-actions .del:hover{background:#fdecea;color:var(--dm-red);border-color:#f5c0b8}

.empty{padding:60px 20px;text-align:center;color:#999;background:#fff;border:1px dashed var(--dm-border);border-radius:8px;font-size:13px}

/* ===================== Modal ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(35,32,31,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:8px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.28)}
.modal-header{background:var(--dm-black);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--dm-yellow)}
.modal-header h3{font-size:15px;font-weight:700}
.modal-close{background:transparent;border:none;color:#fff;font-size:22px;line-height:1;cursor:pointer;padding:0}
.modal-body{padding:18px 20px}
.field{margin-bottom:14px;display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dm-charcoal);font-weight:700}
.field input{padding:10px 12px;border:1px solid var(--dm-border);border-radius:5px;font-size:14px;font-family:inherit;color:var(--dm-black)}
.field input:focus{outline:none;border-color:var(--dm-yellow-dark);box-shadow:0 0 0 3px rgba(253,211,0,.18)}
.field .hint{font-size:11px;color:#999;margin-top:2px}
.modal-actions{padding:12px 20px 20px;display:flex;gap:8px;justify-content:flex-end}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--dm-black);color:#fff;padding:11px 20px;border-radius:6px;font-size:13px;font-weight:600;border-left:4px solid var(--dm-yellow);box-shadow:0 8px 30px rgba(35,32,31,.25);opacity:0;pointer-events:none;transition:.25s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<header class="header">
  <div class="logo">DM</div>
  <div class="header-txt">
    <h1>DM GROUP — South32 Registers</h1>
    <p>Live tracking registers for South32 projects</p>
  </div>
</header>

<div class="subnav"><svg width="15" height="15"><use href="#i-briefcase"/></svg> <b>Registers</b></div>

<div class="container">

  <div class="topbar">
    <div class="search">
      <svg width="17" height="17"><use href="#i-search"/></svg>
      <input id="q" type="text" placeholder="Search register, site or client…">

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">New Register</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>

<div id="toast" class="toast"></div>

<script>
/* ============================================================
   South32 portal — lists the client's registers.
   Uses the same DM TRACKING Supabase project as the Dawsons
   portal, but its own jobs table so the two never collide.
   ------------------------------------------------------------
   One-time setup SQL (run in the Supabase SQL editor):
     create table south32_jobs (
       id text primary key,
       project text,
       subtitle text,
       pos int
     );
     alter table south32_jobs enable row level security;
     create policy "public read"  on south32_jobs for select using (true);
     create policy "public write" on south32_jobs for all    using (true) with check (true);
     alter publication supabase_realtime add table south32_jobs;
   ============================================================ */
const SUPABASE_URL = "https://xabzlhdqozvibpjgkxws.supabase.co";
const SUPABASE_KEY = "sb_publishable_xG7KPvVEIlV9h7EYR9IgmA_ZPqyy-AO";
const TABLE = "south32_jobs";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SEED = [{ id:"CNN", project:"Cannington — Project Tracking Register", subtitle:"South32 Cannington · Structural / Platework", pos:0 }];
let jobs=[]; let editingId=null;

const list=document.getElementById("list");
const q=document.getElementById("q");
const modal=document.getElementById("modal");

function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove("show"),2500);}
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function slugOK(s){return /^[A-Za-z0-9][A-Za-z0-9\-_]{0,40}$/.test(s);}

function passFilter(j){
  const t=q.value.trim().toLowerCase(); if(!t) return true;
  return (j.id+" "+j.project+" "+(j.subtitle||"")).toLowerCase().includes(t);
}

function jobHTML(j){
  const jid=encodeURIComponent(j.id);
  return `
    <a class="job" href="./register.html?job=${jid}">
      <div class="job-num">${esc(j.id)}</div>
      <div class="job-text">
        <div class="job-project">${esc(j.project||"—")}</div>
        <div class="job-sub">${esc(j.subtitle||"Tracking register")}</div>
      </div>
      <div class="job-actions">
        <a href="./view.html?job=${jid}" title="Open client viewer" onclick="event.stopPropagation()"><svg width="15" height="15"><use href="#i-eye"/></svg></a>
        <button title="Edit register details" onclick="event.preventDefault();event.stopPropagation();editJob('${esc(j.id)}')"><svg width="15" height="15"><use href="#i-pencil"/></svg></button>
        <button class="del" title="Remove from portal" onclick="event.preventDefault();event.stopPropagation();deleteJob('${esc(j.id)}')"><svg width="15" height="15"><use href="#i-trash"/></svg></button>
      </div>
    </a>`;
}

function render(){
  const rows=jobs.filter(passFilter).sort((a,b)=>(a.pos||0)-(b.pos||0));
  if(!jobs.length){
    list.innerHTML='<div class="empty">No registers yet. Click <b>+ New Register</b> to create the first one.</div>';return;
  }
  if(!rows.length){
    list.innerHTML='<div class="empty">No registers match your search.</div>';return;
  }
  list.innerHTML = rows.map(jobHTML).join("");
}

function openNew(){
  editingId=null;
  document.getElementById("modalTitle").textContent="New Register";
  document.getElementById("fJob").value=""; document.getElementById("fJob").disabled=false;
  document.getElementById("fProject").value="";
  document.getElementById("fSubtitle").value="";
  modal.classList.add("show");
  setTimeout(()=>document.getElementById("fJob").focus(),50);
}
function editJob(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  editingId=id;
  document.getElementById("modalTitle").textContent="Edit Register";
  document.getElementById("fJob").value=j.id; document.getElementById("fJob").disabled=true;
  document.getElementById("fProject").value=j.project||"";
  document.getElementById("fSubtitle").value=j.subtitle||"";
  modal.classList.add("show");
  setTimeout(()=>document.getElementById("fProject").focus(),50);
}
function closeModal(){modal.classList.remove("show");}
modal.addEventListener("click",e=>{if(e.target===modal)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

document.getElementById("newBtn").addEventListener("click",openNew);
q.addEventListener("input",render);

document.getElementById("saveBtn").addEventListener("click",async ()=>{
  const id=document.getElementById("fJob").value.trim();
  const project=document.getElementById("fProject").value.trim();
  const subtitle=document.getElementById("fSubtitle").value.trim();
  if(!id||!project){toast("Reference and register name are required");return;}
  if(!editingId && !slugOK(id)){toast("Reference: letters, numbers and hyphens only");return;}
  if(!editingId && jobs.some(j=>j.id===id)){toast("A register with that reference already exists");return;}
  const maxPos=jobs.reduce((m,j)=>Math.max(m,j.pos||0),0);
  const rec={id, project, subtitle, pos: editingId ? (jobs.find(j=>j.id===editingId)?.pos||0) : maxPos+1};
  const {error}=await sb.from(TABLE).upsert(rec,{onConflict:"id"});
  if(error){toast("Save failed — "+error.message);return;}
  toast(editingId?"Register updated":"Register created");
  closeModal();
  const i=jobs.findIndex(j=>j.id===rec.id);
  if(i>=0) jobs[i]=rec; else jobs.push(rec);
  render();
});

async function deleteJob(id){
  const j=jobs.find(x=>x.id===id); if(!j) return;
  if(!confirm(`Remove ${id} — ${j.project} from the portal?\n\nThis only removes the entry from the list. The register data in Supabase is untouched.`))return;
  const {error}=await sb.from(TABLE).delete().eq("id",id);
  if(error){toast("Delete failed");return;}
  jobs=jobs.filter(x=>x.id!==id);
  render(); toast("Register removed");
}

async function load(){
  const {data,error}=await sb.from(TABLE).select("*").order("pos",{ascending:true});
  if(error){list.innerHTML='<div class="empty">Could not reach the registers table. Run the setup SQL in Supabase.</div>';return;}
  if(!data.length){
    for(const s of SEED){ await sb.from(TABLE).upsert(s,{onConflict:"id"}); }
    jobs=[...SEED];
  }else jobs=data;
  render();
}

sb.channel("south32-jobs")
  .on("postgres_changes",{event:"*",schema:"public",table:TABLE},payload=>{
    const row=payload.new||payload.old;
    if(payload.eventType==="DELETE") jobs=jobs.filter(j=>j.id!==row.id);
    else{
      const i=jobs.findIndex(j=>j.id===payload.new.id);
      if(i>=0) jobs[i]=payload.new; else jobs.push(payload.new);
    }
    render();
  })
  .subscribe();

load();
</script>
